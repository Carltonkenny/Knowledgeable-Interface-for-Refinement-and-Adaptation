# PromptForge v2.0 - Docker Compose (Backend Only)
# Frontend runs locally via `npm run dev`
# ─────────────────────────────────────────────

services:
  # ── Redis Cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: promptforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PromptForge API ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Redis to use Docker internal network
      - REDIS_URL=redis://redis:6379
      # CORS: Allow local frontend
      - FRONTEND_URLS=http://localhost:3000,http://localhost:9000
      # Dev mode
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ───────────────────────────────────
volumes:
  redis_data:
    driver: local
