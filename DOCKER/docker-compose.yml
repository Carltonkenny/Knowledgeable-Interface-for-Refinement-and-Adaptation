# ─────────────────────────────────────────────
# PromptForge Docker Compose
# ─────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptforge
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount code for development (hot reload)
      - .:/app
      # Exclude __pycache__ and venv from mount
      - /app/__pycache__
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
